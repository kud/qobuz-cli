name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      # The published package ships native/media-key.swift (compiled at runtime
      # on macOS); CI only needs the JS bundle, so skip the swiftc build step.
      - run: npx tsup
      - run: npm publish --access public
