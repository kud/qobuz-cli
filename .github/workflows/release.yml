name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: npm ci
      # The published package ships native/media-key.swift (compiled at runtime
      # on macOS); CI only needs the JS bundle, so skip the swiftc build step.
      - run: npx tsup
      - run: npm publish --access public
